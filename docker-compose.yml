version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: sheryai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  firestore-emulator:
    image: mtlynch/firestore-emulator-docker
    container_name: sheryai-firestore-emulator
    environment:
      - FIRESTORE_PROJECT_ID=sheryai-local
    ports:
      - "8080:8080"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sheryai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
